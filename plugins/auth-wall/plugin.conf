# ============================================================================
# auth-wall 插件构建配置
#
# 由主安装脚本 scripts/install.sh 读取，用于集中编译。
# ============================================================================

# 添加到 cargo build 的 feature flags（空格分隔）
CARGO_FEATURES="auth-wall"

# 需要用上述 features 编译的额外二进制文件（空格分隔）
# server 由主脚本始终编译，此处只需列出插件特有的二进制
CARGO_BINS="set-password"

# 插件源码安装到 vibe-kanban 的目标目录（相对于 VK_DIR）
INSTALL_DIR="crates/auth-wall"
